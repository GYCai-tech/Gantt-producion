<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>{% block title %}GYC · Planificador{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css" />
  {% block head %}{% endblock %}
</head>

<body>
  <header class="app-navbar">
    <span class="app-navbar__brand"><strong>GYC</strong> · Planificador</span>
    <nav class="app-navbar__links">
      <a href="/" class="app-nav-link {{ 'active' if current_page == 'planificador' else '' }}">Planificador</a>
      <a href="/historico-produccion" class="app-nav-link {{ 'active' if current_page == 'historico' else '' }}">Histórico Producción</a>
      <a href="/consultor-bonos" class="app-nav-link {{ 'active' if current_page == 'consultor' else '' }}">Consultor de Bonos</a>
    </nav>
  </header>
  {% block body %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>

</html>
