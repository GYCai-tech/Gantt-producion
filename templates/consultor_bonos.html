{% extends "base.html" %}

{% block title %}GYC · Consultor de Bonos{% endblock %}

{% block head %}
<style>
  /* ── Navbar propia de esta página (mismo patrón que Histórico) ── */
  .cb-navbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 52px;
    background: var(--surface); border-bottom: 1px solid var(--line);
  }
  .cb-navbar__brand { font-size: 15px; font-weight: 700; color: var(--ink); letter-spacing: -.01em; }
  .cb-navbar__links { display: flex; gap: 4px; }
  .cb-nav-link {
    padding: 6px 14px; font-size: 13.5px; font-weight: 500; color: var(--ink-2);
    text-decoration: none; border-radius: 7px; transition: background .12s, color .12s;
  }
  .cb-nav-link:hover { background: var(--accent-2); color: var(--accent); }
  .cb-nav-link.active { background: var(--accent); color: #fff; }

  /* ── Consultor de Bonos (paleta adaptada al estilo del Planificador) ── */
  *, *::before, *::after { box-sizing: border-box; }

  #cb-app { min-height: 0; display: flex; flex-direction: column; }

  /* ── Top loading bar ── */
  #loading-bar {
    position: fixed; top: 0; left: 0; height: 3px;
    background: var(--accent); z-index: 200; width: 0%; opacity: 0;
    transition: width .3s ease, opacity .3s ease;
  }
  #loading-bar.active { opacity: 1; animation: cbLoadBar 1.4s ease infinite; }
  #loading-bar.done   { width: 100% !important; opacity: 0; animation: none; transition: width .15s ease, opacity .3s ease .1s; }
  @keyframes cbLoadBar { 0%{width:0%;opacity:1} 65%{width:85%} 100%{width:95%} }
  @keyframes cbSpin    { to { transform: rotate(360deg); } }

  /* ── Header ── */
  #cb-header {
    background: var(--surface); border-bottom: 1px solid var(--line);
    padding: 16px 24px 0; position: sticky; top: 0; z-index: 10;
  }
  .cb-header-top { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 20px; padding-bottom: 14px; }
  .cb-header-brand { flex-shrink: 0; }
  .cb-eyebrow { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 2px; margin-bottom: 2px; }
  .cb-title   { font-size: 20px; font-weight: 800; color: var(--ink); letter-spacing: -0.3px; white-space: nowrap; }

  /* ── Dropdown ── */
  .dropdown-wrap { flex: 1; max-width: 340px; position: relative; }
  #dropdown-btn {
    width: 100%; display: flex; align-items: center;
    background: var(--surface-2); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 10px 14px; cursor: pointer; transition: border-color .15s; text-align: left;
  }
  #dropdown-btn:hover { border-color: #cbd5e1; }
  #dropdown-btn.open  { border-color: var(--accent); }
  .dropdown-inner { flex: 1; min-width: 0; }
  .dropdown-label { font-size: 9px; font-weight: 700; color: var(--ink-3); letter-spacing: 1.5px; margin-bottom: 1px; }
  .dropdown-value { font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dropdown-arrow { font-size: 16px; color: var(--ink-3); margin-left: 8px; transition: transform .2s; flex-shrink: 0; }
  #dropdown-btn.open .dropdown-arrow { transform: rotate(180deg); }

  .dd-spinner { width: 16px; height: 16px; border: 2px solid var(--accent-2); border-top-color: var(--accent); border-radius: 50%; animation: cbSpin .6s linear infinite; margin-right: 4px; }

  #dd-popover {
    position: absolute; top: calc(100% + 6px); left: 0; width: 100%; min-width: 280px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    box-shadow: var(--shadow-2); z-index: 50; max-height: 320px; overflow-y: auto; display: none;
  }
  #dd-popover.open { display: block; animation: cbPopIn .15s ease; }
  @keyframes cbPopIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

  .option { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--line-2); cursor: pointer; transition: background .1s; }
  .option:last-child { border-bottom: none; }
  .option:hover  { background: var(--surface-2); }
  .option.active { background: var(--accent-2); }
  .option-left   { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .option-dot    { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .option-text   { min-width: 0; }
  .option-name   { font-size: 14px; font-weight: 500; color: var(--ink-2); }
  .option.active .option-name { font-weight: 700; color: var(--accent); }
  .option-sub    { font-size: 11px; color: var(--ink-3); margin-top: 1px; }
  .option-check  { font-size: 14px; color: var(--accent); font-weight: 700; flex-shrink: 0; margin-left: 8px; }

  .cb-header-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
  #refresh-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent-2); border: 1.5px solid #c9d8fb; color: var(--accent);
    font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: border-color .15s, background .15s, transform .1s; flex-shrink: 0;
  }
  #refresh-btn:hover  { border-color: var(--accent); background: #dce6fc; }
  #refresh-btn:active { transform: scale(.92); }
  #refresh-btn.spinning .refresh-icon { animation: cbSpin .6s linear infinite; }
  #refresh-btn.disabled { opacity: .5; pointer-events: none; }
  .refresh-icon { display: inline-block; }
  #last-updated { font-size: 11px; color: var(--ink-3); white-space: nowrap; }

  /* ── Search bar ── */
  .search-wrap { flex: 1; max-width: 260px; position: relative; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--ink-3); pointer-events: none; }
  #search-input {
    width: 100%; background: var(--surface-2); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 10px 32px 10px 34px; font-size: 14px; font-weight: 500; color: var(--ink);
    outline: none; transition: border-color .15s; font-family: inherit;
  }
  #search-input::placeholder { color: var(--ink-3); }
  #search-input:focus { border-color: var(--accent); }
  .search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--ink-3); font-size: 16px;
    line-height: 1; padding: 2px; display: none;
  }
  .search-clear.visible { display: block; }
  .search-clear:hover { color: var(--ink-2); }

  /* ── Filter tabs ── */
  #filter-tabs { max-width: 1400px; margin: 0 auto; display: flex; gap: 2px; border-top: 1px solid var(--line-2); }
  .tab {
    display: flex; align-items: center; gap: 7px; padding: 10px 18px; font-size: 13px; font-weight: 600;
    color: var(--ink-3); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: color .15s, border-color .15s; white-space: nowrap;
  }
  .tab:hover { color: var(--ink-2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-blocked:hover { color: var(--rojo); }
  .tab-blocked.active { color: var(--rojo); border-bottom-color: var(--rojo); }
  .tab-blocked.active .tab-badge { background: var(--rojo-bg); color: var(--rojo); }
  .tab-badge {
    font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
    background: var(--line-2); color: var(--ink-3); transition: background .15s, color .15s;
    min-width: 22px; text-align: center;
  }
  .tab.active .tab-badge { background: var(--accent-2); color: var(--accent); }

  /* ── Stats bar ── */
  #stats-bar { display: none; align-items: center; gap: 8px; padding: 8px 24px; background: var(--surface); border-bottom: 1px solid var(--line-2); }
  #stats-bar.visible { display: flex; }
  .stats-inner { max-width: 1400px; margin: 0 auto; width: 100%; display: flex; align-items: center; gap: 8px; }
  .stats-dot   { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .stats-text  { font-size: 13px; color: var(--ink-2); }
  .stats-count { font-weight: 700; color: var(--accent); }

  /* ── Mobile overlay / sheet ── */
  #overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
  #overlay.visible  { display: flex; }
  #overlay.fade-in  { animation: cbFadeIn .15s ease; }
  #overlay.fade-out { animation: cbFadeOut .15s ease forwards; }
  @keyframes cbFadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes cbFadeOut { from{opacity:1} to{opacity:0} }
  #sheet {
    background: var(--surface); border-top-left-radius: 20px; border-top-right-radius: 20px;
    width: 100%; max-width: 520px; max-height: 70vh; display: flex; flex-direction: column; padding-bottom: 24px;
  }
  #overlay.fade-in  #sheet { animation: cbSlideUp .2s ease; }
  #overlay.fade-out #sheet { animation: cbSlideDown .15s ease forwards; }
  @keyframes cbSlideUp   { from{transform:translateY(100%)} to{transform:translateY(0)} }
  @keyframes cbSlideDown { from{transform:translateY(0)} to{transform:translateY(100%)} }
  .sheet-handle { width: 36px; height: 4px; background: var(--line); border-radius: 2px; margin: 12px auto 16px; flex-shrink: 0; }
  .sheet-title  { font-size: 12px; font-weight: 700; color: var(--ink-3); letter-spacing: 1px; text-align: center; margin-bottom: 8px; flex-shrink: 0; }
  #sheet-options { overflow-y: auto; flex: 1; }

  /* ── Content ── */
  #cb-content { flex: 1; padding: 20px 24px 48px; }
  .cb-content-inner { max-width: 1400px; margin: 0 auto; }

  /* ── Cards grid ── */
  .cards-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 640px)  { .cards-grid { grid-template-columns: repeat(2,1fr); } }
  @media (min-width: 1024px) { .cards-grid { grid-template-columns: repeat(3,1fr); } }
  @media (min-width: 1400px) { .cards-grid { grid-template-columns: repeat(4,1fr); } }

  .card {
    background: var(--surface); border-radius: var(--radius); padding: 16px; border: 1px solid var(--line);
    box-shadow: var(--shadow-1); animation: cbCardIn .2s ease both; display: flex; flex-direction: column;
  }
  @keyframes cbCardIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .card-top   { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .card-ids   { text-align: center; }
  .orden-label { font-size: 9px; font-weight: 700; color: var(--ink-3); letter-spacing: 1.5px; margin-bottom: 2px; }
  .orden-value { font-size: 22px; font-weight: 800; color: var(--ink); }
  .bono-value  { color: var(--ink-2); font-weight: 600; }
  .card-divider { width: 1px; height: 30px; background: var(--line); }
  .spacer { flex: 1; }
  .badge { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 20px; }
  .badge-dot  { width: 6px; height: 6px; border-radius: 50%; }
  .badge-text { font-size: 11px; font-weight: 700; white-space: nowrap; }
  .divider-h  { height: 1px; background: var(--line-2); margin-bottom: 14px; }
  .field-label { font-size: 10px; font-weight: 700; color: var(--ink-3); letter-spacing: 1.5px; margin-bottom: 3px; }
  .mt { margin-top: 12px; }
  .field-value { font-size: 15px; font-weight: 600; color: var(--ink-2); line-height: 1.4; }
  .field-sub   { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .card-body   { flex: 1; }
  .card-footer { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line-2); }
  .chip { flex: 1; display: flex; align-items: center; gap: 4px; background: var(--surface-2); border-radius: 8px; padding: 6px 8px; border: 1px solid var(--line); min-width: 0; }
  .chip-icon { font-size: 11px; flex-shrink: 0; }
  .chip-text { font-size: 11px; color: var(--ink-2); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── States ── */
  .state-view { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 40px; text-align: center; min-height: 300px; }
  .state-icon  { font-size: 48px; margin-bottom: 16px; }
  .state-title { font-size: 20px; font-weight: 800; color: var(--ink); margin-bottom: 8px; }
  .state-text  { font-size: 14px; color: var(--ink-2); line-height: 1.6; margin-bottom: 28px; }
  .retry-btn { padding: 12px 28px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .15s, transform .1s; }
  .retry-btn:hover  { opacity: .9; }
  .retry-btn:active { transform: scale(.97); }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--accent-2); border-top-color: var(--accent); border-radius: 50%; animation: cbSpin .7s linear infinite; margin-bottom: 14px; }
  .loading-text { font-size: 13px; color: var(--ink-3); }

  /* ── Dropdown search ── */
  .dd-search-wrap { padding: 10px 12px 8px; border-bottom: 1px solid var(--line-2); position: relative; flex-shrink: 0; }
  .dd-search-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--ink-3); pointer-events: none; }
  .dd-search-input {
    width: 100%; background: var(--surface-2); border: 1.5px solid var(--line); border-radius: 8px;
    padding: 8px 10px 8px 30px; font-size: 13px; font-weight: 500; color: var(--ink);
    outline: none; font-family: inherit; transition: border-color .15s;
  }
  .dd-search-input::placeholder { color: var(--ink-3); }
  .dd-search-input:focus { border-color: var(--accent); }
  .dd-no-results { padding: 20px; text-align: center; color: var(--ink-3); font-size: 13px; }

  #sheet-search { padding: 10px 16px 6px; border-bottom: 1px solid var(--line-2); flex-shrink: 0; }
  #sheet-search .dd-search-wrap { padding: 0; border-bottom: none; }
  #sheet-search .dd-search-icon { left: 10px; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    #cb-header { padding: 14px 16px 0; }
    .cb-header-top { flex-wrap: wrap; gap: 12px; padding-bottom: 12px; }
    .dropdown-wrap { max-width: 100%; order: 3; flex-basis: calc(50% - 6px); }
    .search-wrap   { max-width: 100%; order: 4; flex-basis: calc(50% - 6px); }
    #last-updated { display: none; }
    #cb-content { padding: 14px 12px 40px; }
    #stats-bar { padding: 8px 16px; }
    .tab { padding: 9px 12px; font-size: 12px; }
  }
</style>
{% endblock %}

{% block body %}
<header class="cb-navbar">
  <span class="cb-navbar__brand"><strong>GYC</strong> · Planificador</span>
  <nav class="cb-navbar__links">
    <a href="/" class="cb-nav-link">Planificador</a>
    <a href="/historico-produccion" class="cb-nav-link">Histórico Producción</a>
    <a href="/consultor-bonos" class="cb-nav-link active">Consultor de Bonos</a>
  </nav>
</header>

<div id="loading-bar"></div>
<div id="cb-app">

  <div id="cb-header">
    <div class="cb-header-top">
      <div class="cb-header-brand">
        <div class="cb-eyebrow">GYC · PRODUCCIÓN</div>
        <div class="cb-title">Consultor de Bonos</div>
      </div>

      <div class="dropdown-wrap">
        <button id="dropdown-btn">
          <div class="dropdown-inner">
            <div class="dropdown-label">MÁQUINA</div>
            <div class="dropdown-value" id="dropdown-value">Todas las máquinas</div>
          </div>
          <span class="dropdown-arrow">▾</span>
        </button>
        <div id="dd-popover"></div>
      </div>

      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="search-input" type="text" placeholder="Buscar orden o artículo…" autocomplete="off" />
        <button class="search-clear" id="search-clear" title="Limpiar">✕</button>
      </div>

      <div class="cb-header-right">
        <span id="last-updated"></span>
        <button id="refresh-btn" title="Actualizar">
          <span class="refresh-icon">↺</span>
        </button>
      </div>
    </div>

    <div id="filter-tabs">
      <button class="tab" data-filter="1">Activos <span class="tab-badge" id="badge-1">—</span></button>
      <button class="tab" data-filter="0">En espera <span class="tab-badge" id="badge-0">—</span></button>
      <button class="tab" data-filter="all">Total <span class="tab-badge" id="badge-all">—</span></button>
      <button class="tab tab-blocked" data-filter="blocked">Bloqueadas <span class="tab-badge" id="badge-blocked">—</span></button>
    </div>
  </div>

  <div id="stats-bar">
    <div class="stats-inner">
      <div class="stats-dot"></div>
      <span class="stats-text" id="stats-text"></span>
    </div>
  </div>

  <div id="cb-content">
    <div class="cb-content-inner" id="content-inner"></div>
  </div>

</div>

<div id="overlay">
  <div id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">SELECCIONAR MÁQUINA</div>
    <div id="sheet-search"></div>
    <div id="sheet-options"></div>
  </div>
</div>

<script>
const API = '/api';

const ESTADO = {
  0: { label: 'En espera',  color: '#c4710c', bg: '#fcf1e2', dot: '#c4710c' },
  1: { label: 'Activo',     color: '#1c8a5a', bg: '#e1f5ec', dot: '#1c8a5a' },
  2: { label: 'Finalizado', color: '#5a657a', bg: '#eef1f5', dot: '#97a1b3' },
  3: { label: 'Bloqueado',  color: '#d83b46', bg: '#fcebec', dot: '#d83b46' },
};

let matriculas       = [];
let selectedMat      = null;
let selectedFilter   = '1';      // default: Activos
let searchQuery      = '';
let loadingMats      = true;
let loadingBonos     = false;
let hasContent       = false;
let autoRefreshTimer = null;
let counts           = { '0': null, '1': null, 'all': null, 'blocked': null };
let lastBonos        = [];

const $inner        = document.getElementById('content-inner');
const $statsBar     = document.getElementById('stats-bar');
const $statsText    = document.getElementById('stats-text');
const $dropdownBtn  = document.getElementById('dropdown-btn');
const $dropdownVal  = document.getElementById('dropdown-value');
const $ddPopover    = document.getElementById('dd-popover');
const $overlay      = document.getElementById('overlay');
const $sheetOptions = document.getElementById('sheet-options');
const $refreshBtn   = document.getElementById('refresh-btn');
const $lastUpdated  = document.getElementById('last-updated');
const $loadingBar   = document.getElementById('loading-bar');
const $tabs         = document.querySelectorAll('.tab');
const $searchInput  = document.getElementById('search-input');
const $searchClear  = document.getElementById('search-clear');

const isMobile = () => window.innerWidth < 600;

function barStart() { $loadingBar.classList.remove('done'); $loadingBar.classList.add('active'); }
function barDone()  { $loadingBar.classList.remove('active'); $loadingBar.classList.add('done'); setTimeout(() => $loadingBar.classList.remove('done'), 500); }

async function fetchMatriculas() {
  loadingMats = true;
  setDropdownLoading(true);
  try {
    const r = await fetch(`${API}/matriculas`);
    if (!r.ok) throw new Error();
    matriculas = (await r.json()).matriculas ?? [];
  } catch {}
  finally { loadingMats = false; setDropdownLoading(false); renderDropdownValue(); }
}

async function fetchBonos() {
  if (loadingBonos) return;
  loadingBonos = true;
  setRefreshSpinning(true);
  barStart();
  if (!hasContent) renderContent({ state: 'loading' });

  try {
    const bonosUrl   = buildUrl(selectedFilter);
    const url0       = buildUrl('0');
    const url1       = buildUrl('1');
    const urlAll     = buildUrl('all');
    const urlBlocked = buildUrl('blocked');

    const [rMain, r0, r1, rAll, rBlocked] = await Promise.all([
      fetch(bonosUrl), fetch(url0), fetch(url1), fetch(urlAll), fetch(urlBlocked),
    ]);

    if (!rMain.ok) throw new Error();

    const [dMain, d0, d1, dAll, dBlocked] = await Promise.all([
      rMain.json(),
      r0.ok       ? r0.json()      : { bonos: [] },
      r1.ok       ? r1.json()      : { bonos: [] },
      rAll.ok     ? rAll.json()    : { bonos: [] },
      rBlocked.ok ? rBlocked.json() : { bonos: [] },
    ]);

    counts = {
      '0':       (d0.bonos      ?? []).length,
      '1':       (d1.bonos      ?? []).length,
      'all':     (dAll.bonos    ?? []).length,
      'blocked': (dBlocked.bonos ?? []).length,
    };
    updateTabBadges();
    lastBonos = dMain.bonos ?? [];
    renderContent({ state: 'ok', bonos: lastBonos });
    hasContent = true;
    updateLastUpdated();
  } catch {
    renderContent({ state: 'error' });
    hasContent = true;
  } finally {
    loadingBonos = false;
    setRefreshSpinning(false);
    barDone();
    scheduleAutoRefresh();
  }
}

function buildUrl(filter) {
  if (filter === 'blocked') {
    let url = `${API}/bonos?estado_orden=1&estado_bono=3`;
    if (selectedMat) url += `&matricula=${encodeURIComponent(selectedMat)}`;
    return url;
  }
  let url = `${API}/bonos?estado_orden=1`;
  if (filter !== 'all') url += `&estado_bono=${filter}`;
  if (selectedMat) url += `&matricula=${encodeURIComponent(selectedMat)}`;
  return url;
}

function scheduleAutoRefresh() {
  clearTimeout(autoRefreshTimer);
  autoRefreshTimer = setTimeout(fetchBonos, 60_000);
}

function updateLastUpdated() {
  const n = new Date();
  $lastUpdated.textContent = `Actualizado ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

function updateTabBadges() {
  ['0','1','all','blocked'].forEach(f => {
    const el = document.getElementById(`badge-${f}`);
    if (el) el.textContent = counts[f] ?? '—';
  });
}

function setActiveTab(filter) {
  selectedFilter = filter;
  $tabs.forEach(t => t.classList.toggle('active', t.dataset.filter === filter));
}

function setRefreshSpinning(on) {
  $refreshBtn.classList.toggle('spinning', on);
  $refreshBtn.classList.toggle('disabled', on);
}

function setDropdownLoading(on) {
  let s = $dropdownBtn.querySelector('.dd-spinner');
  if (on && !s) {
    s = document.createElement('div'); s.className = 'dd-spinner';
    $dropdownBtn.insertBefore(s, $dropdownBtn.querySelector('.dropdown-arrow'));
  } else if (!on && s) s.remove();
}

function renderDropdownValue() {
  if (selectedMat) {
    const m = matriculas.find(x => x.matricula === selectedMat);
    $dropdownVal.textContent = m?.descrip || selectedMat;
  } else {
    $dropdownVal.textContent = 'Todas las máquinas';
  }
}

function applySearch() {
  if (!lastBonos.length) return;
  const q = searchQuery.trim().toLowerCase();
  const filtered = q
    ? lastBonos.filter(b =>
        String(b.idorden).toLowerCase().includes(q) ||
        String(b.idbono).toLowerCase().includes(q) ||
        String(b.descrip_articulo || '').toLowerCase().includes(q))
    : lastBonos;
  renderContent({ state: 'ok', bonos: filtered });
}

function renderContent({ state, bonos }) {
  $statsBar.classList.remove('visible');

  if (state === 'loading') {
    $inner.innerHTML = `<div class="state-view"><div class="spinner"></div><span class="loading-text">Cargando bonos…</span></div>`;
    return;
  }
  if (state === 'error') {
    $inner.innerHTML = `
      <div class="state-view">
        <div class="state-icon">⚡</div>
        <div class="state-title">Sin conexión</div>
        <div class="state-text">No se puede contactar con el servidor</div>
        <button class="retry-btn" id="retry-btn">Reintentar</button>
      </div>`;
    document.getElementById('retry-btn')?.addEventListener('click', () => { hasContent = false; fetchMatriculas(); fetchBonos(); });
    return;
  }
  if (bonos.length === 0) {
    const labels = { '1': 'No hay bonos activos', '0': 'No hay bonos en espera', 'all': 'No hay bonos', 'blocked': 'No hay órdenes bloqueadas' };
    $inner.innerHTML = `
      <div class="state-view">
        <div class="state-icon">✓</div>
        <div class="state-title">Todo al día</div>
        <div class="state-text">${labels[selectedFilter] || 'No hay bonos'} para la selección actual</div>
      </div>`;
    return;
  }

  $statsBar.classList.add('visible');
  const tabLabel = { '1': 'activos', '0': 'en espera', 'all': 'en total', 'blocked': 'bloqueados' };
  const machine  = selectedMat ? ` · ${matriculas.find(m => m.matricula === selectedMat)?.descrip || selectedMat}` : '';
  const searchSuffix = searchQuery.trim() ? ` · "${searchQuery.trim()}"` : '';
  $statsText.innerHTML = `<span class="stats-count">${bonos.length}</span> ${bonos.length === 1 ? 'bono' : 'bonos'} ${tabLabel[selectedFilter] || ''}${machine}${searchSuffix}`;

  const grid = document.createElement('div');
  grid.className = 'cards-grid';
  bonos.forEach((b, i) => {
    const el = buildCard(b);
    el.style.animationDelay = `${i * 30}ms`;
    grid.appendChild(el);
  });
  $inner.innerHTML = '';
  $inner.appendChild(grid);
}

function buildCard(b) {
  const estado = ESTADO[b.estado_bono] ?? ESTADO[0];
  const card = document.createElement('div');
  card.className = 'card';
  const hasSub = b.matricula && b.descrip_matricula;
  card.innerHTML = `
    <div class="card-top">
      <div class="card-ids"><div class="orden-label">ORDEN</div><div class="orden-value">#${b.idorden}</div></div>
      <div class="card-divider"></div>
      <div class="card-ids"><div class="orden-label">BONO</div><div class="orden-value bono-value">${b.idbono}</div></div>
      <div class="spacer"></div>
      <div class="badge" style="background:${estado.bg}">
        <div class="badge-dot" style="background:${estado.dot}"></div>
        <span class="badge-text" style="color:${estado.color}">${estado.label}</span>
      </div>
    </div>
    <div class="divider-h"></div>
    <div class="card-body">
      <div class="field-label">ARTÍCULO</div>
      <div class="field-value">${esc(b.descrip_articulo || '—')}</div>
      <div class="field-label mt">MÁQUINA</div>
      <div class="field-value">${esc(b.descrip_matricula || b.matricula || '—')}</div>
      ${hasSub ? `<div class="field-sub">${esc(b.matricula)}</div>` : ''}
    </div>
    <div class="card-footer">
      <div class="chip"><span class="chip-icon">📍</span><span class="chip-text">${esc(b.area||'—')}</span></div>
      <div class="chip"><span class="chip-icon">🏢</span><span class="chip-text">${esc(b.idcliente||'—')}</span></div>
      <div class="chip"><span class="chip-icon">👤</span><span class="chip-text">${esc(b.usuario||'—')}</span></div>
    </div>`;
  return card;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const sortedMats = () => [...matriculas].sort((a, b) =>
  (a.descrip || a.matricula).localeCompare(b.descrip || b.matricula, 'es', { sensitivity: 'base' })
);

function buildOptions(optsCont, closeCb, searchCont) {
  optsCont.innerHTML = '';

  const searchWrap = document.createElement('div');
  searchWrap.className = 'dd-search-wrap';
  searchWrap.innerHTML = `
    <span class="dd-search-icon">⌕</span>
    <input class="dd-search-input" type="text" placeholder="Buscar máquina…" autocomplete="off" />`;

  if (searchCont) {
    searchCont.innerHTML = '';
    searchCont.appendChild(searchWrap);
  } else {
    optsCont.appendChild(searchWrap);
  }

  const optsList = document.createElement('div');
  optsCont.appendChild(optsList);

  function renderOpts(query) {
    optsList.innerHTML = '';
    const q = query.trim().toLowerCase();
    const mats = sortedMats();
    const filtered = q
      ? mats.filter(m =>
          (m.descrip || '').toLowerCase().includes(q) ||
          (m.matricula || '').toLowerCase().includes(q))
      : mats;

    const makeOpt = (label, value, active, sub) => {
      const el = document.createElement('div');
      el.className = 'option' + (active ? ' active' : '');
      el.innerHTML = `
        <div class="option-left">
          ${active ? '<div class="option-dot"></div>' : ''}
          <div class="option-text">
            <div class="option-name">${esc(label)}</div>
            ${sub ? `<div class="option-sub">${esc(sub)}</div>` : ''}
          </div>
        </div>
        ${active ? '<span class="option-check">✓</span>' : ''}`;
      el.addEventListener('click', () => {
        selectedMat = value;
        renderDropdownValue();
        closeCb();
        hasContent = false;
        fetchBonos();
      });
      return el;
    };

    if (!q) optsList.appendChild(makeOpt('Todas las máquinas', null, selectedMat === null));

    filtered.forEach(m =>
      optsList.appendChild(makeOpt(m.descrip || m.matricula, m.matricula, selectedMat === m.matricula, m.matricula))
    );

    if (q && filtered.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'dd-no-results';
      empty.textContent = 'Sin resultados';
      optsList.appendChild(empty);
    }
  }

  renderOpts('');

  const input = searchWrap.querySelector('.dd-search-input');
  input.addEventListener('input', () => renderOpts(input.value));
  setTimeout(() => input.focus(), 60);
}

function openDropdown() {
  if (loadingMats) return;
  const $sheetSearch = document.getElementById('sheet-search');
  if (isMobile()) {
    buildOptions($sheetOptions, closeSheet, $sheetSearch);
    $overlay.classList.remove('fade-out');
    $overlay.classList.add('visible','fade-in');
  } else {
    buildOptions($ddPopover, closePopover, null);
    $ddPopover.classList.add('open');
  }
  $dropdownBtn.classList.add('open');
}

function closePopover() { $ddPopover.classList.remove('open'); $dropdownBtn.classList.remove('open'); }
function closeSheet() {
  $overlay.classList.remove('fade-in');
  $overlay.classList.add('fade-out');
  $dropdownBtn.classList.remove('open');
  document.getElementById('sheet-search').innerHTML = '';
  setTimeout(() => $overlay.classList.remove('visible','fade-out'), 150);
}
function closeAll() { closePopover(); if ($overlay.classList.contains('visible')) closeSheet(); }

$dropdownBtn.addEventListener('click', e => {
  e.stopPropagation();
  ($ddPopover.classList.contains('open') || $overlay.classList.contains('visible')) ? closeAll() : openDropdown();
});
document.addEventListener('click', e => { if (!$dropdownBtn.closest('.dropdown-wrap').contains(e.target)) closePopover(); });
$overlay.addEventListener('click', e => { if (e.target === $overlay) closeSheet(); });
$refreshBtn.addEventListener('click', () => fetchBonos());
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAll(); });

$tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    if (tab.dataset.filter === selectedFilter) return;
    setActiveTab(tab.dataset.filter);
    hasContent = false;
    fetchBonos();
  });
});

$searchInput.addEventListener('input', () => {
  searchQuery = $searchInput.value;
  $searchClear.classList.toggle('visible', searchQuery.length > 0);
  applySearch();
});

$searchClear.addEventListener('click', () => {
  $searchInput.value = '';
  searchQuery = '';
  $searchClear.classList.remove('visible');
  $searchInput.focus();
  applySearch();
});

setActiveTab('1');
Promise.all([fetchMatriculas(), fetchBonos()]);
</script>
{% endblock %}
