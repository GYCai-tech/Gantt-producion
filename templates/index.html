{% extends "base.html" %}
{% block title %}GYC · Seguimiento de Producción{% endblock %}

{% block body %}
<div class="app">

  <!-- ── Barra superior ── -->
  <header class="topbar">
    <div class="brand">
      <div class="brand__mark">GYC</div>
      <div class="brand__name">Seguimiento de Producción<small>Actividad en tiempo real</small></div>
    </div>

    <div class="topbar__right">
      <a href="/historico-produccion" class="btn-refresh" style="text-decoration:none">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Histórico
      </a>
      <button class="btn-refresh" id="btn-refresh" onclick="App.refrescar()" title="Traer datos del ERP ahora">
        <svg class="ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
        <span id="refresh-label">Actualizar</span>
      </button>
      <span class="topbar__clock" id="clock"></span>
    </div>
  </header>

  <!-- ── Espacio de trabajo ── -->
  <div class="workspace">

    <!-- Panel principal (ocupa todo el ancho) -->
    <main class="panel">

      <div class="controls">
        <div class="zoom" id="vista-tabs">
          <button class="is-active" data-v="empleado" onclick="App.setVista('empleado')">Operarios</button>
          <button data-v="maquina" onclick="App.setVista('maquina')">Máquinas</button>
        </div>
        <div class="sep"></div>
        <button class="icon-btn" onclick="App.nav(-1)" aria-label="Anterior">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <span class="range-label" id="range-label"></span>
        <button class="icon-btn" onclick="App.nav(1)" aria-label="Siguiente">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <button class="btn" onclick="App.today()">Hoy</button>
        <div class="sep"></div>
        <div class="zoom" id="zoom"></div>
        <div class="sep"></div>
        <div class="zoom" id="carga">
          <button onclick="App.setCarga('todos')">Todos</button>
          <button class="is-active" onclick="App.setCarga('con')">Con actividad</button>
          <button onclick="App.setCarga('sin')">Sin actividad</button>
        </div>

        <div class="sep"></div>
        <div class="search-gantt-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="search-gantt" type="search" placeholder="Operario, máquina u orden…" oninput="App.setSearch(this.value)">
        </div>
        <div class="summary" id="summary"></div>
      </div>

      <div class="areas" id="areas"></div>

      <!-- Gantt -->
      <div class="gantt" id="gantt">
        <div class="gantt__inner" id="gantt-inner">
          <div class="gantt__head">
            <div class="gantt__corner" id="gantt-corner">Operarios</div>
            <div class="axis" id="axis"></div>
          </div>
          <div class="gantt__main" id="gantt-main">
            <div class="gantt__bg" id="gantt-bg"></div>
            <div class="gantt__rows" id="gantt-rows"></div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Tooltip -->
<div class="tip" id="tip"></div>

<!-- Modal: detalle (solo lectura) -->
<div class="overlay" id="ov-detalle">
  <div class="modal modal--sm">
    <div class="modal__head">
      <div class="modal__title">Orden <b id="d-orden"></b></div>
      <button class="modal__close" onclick="App.closeModal('ov-detalle')">×</button>
    </div>
    <div class="modal__body" id="d-body"></div>
    <div class="modal__foot">
      <button class="btn" onclick="App.closeModal('ov-detalle')">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
{% endblock %}

{% block scripts %}
<script src="/static/js/app.js"></script>
{% endblock %}
