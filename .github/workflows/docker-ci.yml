name: Integración y Despliegue Continuo (Gantt Producción)

on:
  push:
    branches: [ "main" ]

jobs:
  # 🧪 TRABAJO 1: Verificar que el código y el Docker compilan bien en GitHub
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias de test
        run: pip install -r requirements-dev.txt

      - name: Ejecutar tests (pytest)
        run: python -m pytest -q

      - name: Crear archivo .env temporal para pruebas
        run: |
          echo "DATABASE_URL=mock_value" >> .env
          echo "PORT=8080" >> .env
          echo "QDRANT_HOST=localhost" >> .env

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir Imagen de Docker
        run: |
          docker build -t gyc-planificador:ci-test .

  # 🚀 TRABAJO 2: Desplegar directamente en el servidor (self-hosted runner)
  deploy:
    runs-on: self-hosted
    needs: build-and-test # Solo se ejecuta si el build de arriba dio verde ✅

    steps:
      - name: Reconstruir y reiniciar el contenedor
        working-directory: /home/goyco/apps/control_producion
        run: |
          git pull --ff-only origin main

          # Detener y eliminar el despliegue anterior (incluye contenedores huérfanos)
          docker compose down --remove-orphans || true
          # Por si quedó un contenedor huérfano con el nombre fijo de un despliegue antiguo
          docker rm -f gyc-planificador || true

          # Reconstruir y levantar usando docker-compose.yml
          docker compose up -d --build