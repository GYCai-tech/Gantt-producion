name: Docker CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: gyc-planificador:ci-test
        # Aprovechar la caché de GitHub Actions para acelerar las builds
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test running container
      run: |
        # Iniciar el contenedor en background
        docker run -d -p 8000:8000 --name test-app gyc-planificador:ci-test
        
        # Esperar unos segundos para que la aplicación inicie (FastAPI/Uvicorn)
        sleep 5
        
        # Comprobar que responde con un HTTP 200 (usa el mismo endpoint del healthcheck)
        curl --fail http://localhost:8000/ || exit 1
        
        # Limpiar
        docker stop test-app
        docker rm test-app