name: Integración Continua (Planificador Producción)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Crear archivo .env temporal
        run: |
          echo "DATABASE_URL=mock_value" >> .env
          echo "PORT=8080" >> .env
          echo "QDRANT_HOST=localhost" >> .env

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir Imagen de Docker
        run: |
          docker build -t gyc-planificador:ci-test .

      - name: Iniciar el contenedor en background
        run: |
          docker run -d -p 8080:8080 --name contenedor_planificador gyc-planificador:ci-tests