name: Integración y Despliegue Continuo (Gantt Producción)

on:
  push:
    branches: [ "main" ]

jobs:
  # 🧪 TRABAJO 1: Verificar que el código y el Docker compilan bien en GitHub
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Crear archivo .env temporal para pruebas
        run: |
          echo "DATABASE_URL=mock_value" >> .env
          echo "PORT=8080" >> .env
          echo "QDRANT_HOST=localhost" >> .env

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir Imagen de Docker
        run: |
          docker build -t gyc-planificador:ci-test .

  # 🚀 TRABAJO 2: Conectarse a tu Debian y actualizar la app en vivo
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test # Solo se ejecuta si el build de arriba dio verde ✅
    
    steps:
      - name: Conectar al servidor Debian vía SSH y reiniciar Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # 1. Entrar a la carpeta real que acabas de clonar con éxito
            cd /home/goyco/apps/control_producion
            
            # 2. Descargar los últimos cambios (usará el token memorizado)
            git pull origin main
            
            # 3. Detener y limpiar el contenedor viejo en producción usando sudo
            sudo docker stop contenedor_planificador || true
            sudo docker rm contenedor_planificador || true
            
            # 4. Reconstruir la imagen real en tu servidor Debian
            sudo docker build -t gyc-planificador:latest .
            
            # 5. Volver a encender el contenedor actualizado en el puerto que desees (ej: 8085)
            sudo docker run -d -p 8085:8080 --name contenedor_planificador gyc-planificador:latest